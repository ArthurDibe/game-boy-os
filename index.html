<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="color-scheme" content="light only">
    <title>Game Boy OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <div class="top-nav">
        <button id="tgl-rot">ROTATE UI</button>
        <button id="tgl-ctrl">TOGGLE GAMEPAD</button>
        <button id="btn-map">KEY BINDINGS</button>
    </div>

    <div id="kModal">
        <div class="k-box">
            <h2>KEY BINDINGS</h2>
            <div id="kb-list"></div>
            <div class="kb-actions">
                <button id="kb-close" class="btn-close">CLOSE</button>
                <button id="kb-reset" class="btn-reset">RESET</button>
            </div>
        </div>
    </div>

    <div class="gb" id="gb">
        <div class="sb">
            <div class="sh"><div class="bat"><div class="bl"></div>BATTERY</div><div class="st">DOT MATRIX WITH STEREO SOUND</div></div>
            <div class="cc"><canvas id="cv" width="200" height="200"></canvas></div>
        </div>
        <div class="cw">
            <div class="dp">
                <div class="dpp dpv"></div><div class="dpp dph"></div><div class="dpc"></div>
                <div class="dh hu" id="bU"></div><div class="dh hd" id="bD"></div><div class="dh hl" id="bL"></div><div class="dh hr" id="bR"></div>
            </div>
            <div class="ab">
                <div class="abc"><button class="ba" id="bB"></button><div class="blab">B</div></div>
                <div class="abc"><button class="ba" id="bA"></button><div class="blab">A</div></div>
            </div>
            <div class="sysb">
                <div class="sysbc"><div class="bsy" id="bSE"></div><div class="sysl">SELECT</div></div>
                <div class="sysbc"><div class="bsy" id="bST"></div><div class="sysl">START</div></div>
            </div>
            <div class="spk"><div class="sps"></div><div class="sps"></div><div class="sps"></div><div class="sps"></div><div class="sps"></div><div class="sps"></div></div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
