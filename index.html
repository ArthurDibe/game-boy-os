<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="color-scheme" content="light only">
    <title>Game Boy OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root{--c0:#0f380f;--c1:#306230;--c2:#8bac0f;--c3:#9bbc0f;--ca:#c3c7c7;--cb:#555;--cr:#903;--cd:#222}
        html, body { color-scheme: light only; background-color: #1a1a1a; }
        body{display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;font-family:'Press Start 2P',monospace;touch-action:none;overflow:hidden;user-select:none;-webkit-user-select:none}
        
        /* Toggle Button for Desktop */
        #tgl { position:fixed; top:20px; left:20px; background:var(--c1); background-image:linear-gradient(var(--c1),var(--c1)); color:var(--c3); border:4px solid var(--c0); padding:10px; font-family:'Press Start 2P',monospace; font-size:10px; cursor:pointer; border-radius:10px; z-index:1000; box-shadow: 4px 4px 0 var(--c0); outline:none; transition:transform 0.1s;}
        #tgl:active { transform:translate(2px,2px); box-shadow: 2px 2px 0 var(--c0); }
        @media (pointer: coarse) { #tgl { display: none; } } /* Hide on touch devices */

        /* Core Game Boy styling - Upright Mode */
        #gb{background:var(--ca);background-image:linear-gradient(var(--ca),var(--ca));width:380px;height:680px;border-radius:15px 15px 60px 15px;padding:25px 20px;box-sizing:border-box;box-shadow:inset -5px -5px 15px rgba(0,0,0,.2),inset 5px 5px 15px rgba(255,255,255,.7),10px 10px 30px rgba(0,0,0,.8);display:flex;flex-direction:column;align-items:center;position:relative;transform-origin:center center;}
        .tg{display:flex;gap:15px;position:absolute;top:0;width:100%;border-top:3px solid rgba(0,0,0,.1)}
        .sb{background:var(--cb);background-image:linear-gradient(var(--cb),var(--cb));width:100%;height:350px;padding:20px 0;border-radius:10px 10px 40px 10px;box-shadow:inset 2px 2px 10px rgba(0,0,0,.7);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;}
        .sh{width:80%;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;position:relative}
        .bat{display:flex;flex-direction:column;align-items:center;font-family:sans-serif;font-size:8px;color:#aaa;letter-spacing:1px;position:absolute;left:-25px}
        .bl{width:10px;height:10px;background:#f33;background-image:linear-gradient(#f33,#f33);border-radius:50%;box-shadow:0 0 5px #f33,inset 1px 1px 2px rgba(255,255,255,.5);margin-bottom:3px}
        .st{color:#aaa;font-family:sans-serif;font-size:10px;letter-spacing:1px;text-align:center;width:100%;margin-left:20px}
        
        /* Enlarged Green Screen */
        .cc{width:280px;height:280px;background:var(--c3);background-image:linear-gradient(var(--c3),var(--c3));box-shadow:inset 3px 3px 10px rgba(0,0,0,.3);border:2px solid var(--c1);position:relative}
        canvas{display:block;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges}
        
        /* Upright Controls */
        .cw{width:100%;flex-grow:1;position:relative;margin-top:20px}
        .dp{position:absolute;left:15px;top:20px;width:90px;height:90px; transition: transform 0.3s ease;}
        .dpp{background:var(--cd);background-image:linear-gradient(var(--cd),var(--cd));position:absolute;border-radius:2px;box-shadow:inset 1px 1px 2px rgba(255,255,255,.2),inset -1px -1px 3px rgba(0,0,0,.5);cursor:pointer}
        .dpp:active{background:#111;background-image:linear-gradient(#111,#111);}
        .dpv{width:30px;height:90px;left:30px;top:0} .dph{width:90px;height:30px;left:0;top:30px}
        .dpc{width:30px;height:30px;background:var(--cd);background-image:linear-gradient(var(--cd),var(--cd));position:absolute;left:30px;top:30px;z-index:2}
        .dpc::after{content:'';position:absolute;top:5px;left:5px;width:20px;height:20px;background:rgba(0,0,0,.2);border-radius:50%}
        .ab{position:absolute;right:15px;top:30px;width:120px;height:60px;transform:rotate(-20deg);display:flex;justify-content:space-between;align-items:center; transition: transform 0.3s ease;}
        .abc{display:flex;flex-direction:column;align-items:center;gap:5px}
        .ba{width:45px;height:45px;background:var(--cr);background-image:linear-gradient(var(--cr),var(--cr));border-radius:50%;box-shadow:inset -2px -2px 5px rgba(0,0,0,.5),inset 2px 2px 5px rgba(255,255,255,.4),2px 2px 5px rgba(0,0,0,.4);cursor:pointer;border:none;outline:none}
        .ba:active{transform:scale(.95);box-shadow:inset 3px 3px 8px rgba(0,0,0,.6)}
        .blab{font-family:sans-serif;color:var(--cd);font-size:14px;font-weight:bold;letter-spacing:1px}
        .sysb{position:absolute;bottom:25px;left:50%;transform:translateX(-50%);display:flex;gap:20px; transition: transform 0.3s ease;}
        .sysbc{display:flex;flex-direction:column;align-items:center;gap:5px}
        .bsy{width:50px;height:12px;background:var(--cd);background-image:linear-gradient(var(--cd),var(--cd));border-radius:10px;transform:rotate(-20deg);box-shadow:inset -1px -1px 3px rgba(0,0,0,.5),inset 1px 1px 2px rgba(255,255,255,.2),1px 1px 3px rgba(0,0,0,.3);cursor:pointer}
        .bsy:active{transform:rotate(-20deg) scale(.95);box-shadow:inset 2px 2px 5px rgba(0,0,0,.6)}
        .sysl{font-family:sans-serif;color:var(--cd);font-size:10px;font-weight:bold}
        .spk{position:absolute;bottom:20px;right:20px;display:flex;gap:5px;transform:rotate(-20deg); transition: transform 0.3s ease;}
        .sps{width:6px;height:40px;background:rgba(0,0,0,.2);background-image:linear-gradient(rgba(0,0,0,.2),rgba(0,0,0,.2));border-radius:3px;box-shadow:inset 1px 1px 2px rgba(0,0,0,.4),1px 1px 0 rgba(255,255,255,.4)}
        .dh{position:absolute;z-index:10;cursor:pointer}
        .hu{width:30px;height:30px;left:30px;top:0} .hd{width:30px;height:30px;left:30px;bottom:0}
        .hl{width:30px;height:30px;left:0;top:30px} .hr{width:30px;height:30px;right:0;top:30px}

        /* === FLUID LANDSCAPE (FULLSCREEN GAMEPAD) MODE === */
        body.ls #gb { border-radius: 0; box-shadow: inset 0 0 50px rgba(0,0,0,.5); padding: 0; }
        
        /* Maximize the green screen with perfectly symmetric 24px top & bottom padding */
        body.ls .sb { 
            position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); 
            width: calc(96vh + 100px); height: calc(96vh + 48px); /* 50px Left/Right, 24px Top/Bottom */
            margin: 0; border-radius: 12px; padding: 24px 50px; box-sizing: border-box; 
        }
        body.ls .cc { width: 96vh; height: 96vh; flex-shrink: 0; margin: 0; }
        
        /* Absolute position UI wrappers to prevent layout shifting */
        body.ls .sh { position: absolute; width: 100%; height: 100%; top: 0; left: 0; margin: 0; pointer-events: none; }
        
        /* Text shifted downward to safely avoid top-edge screen cropping */
        body.ls .st { position: absolute; top: 14px; left: 0; width: 100%; text-align: center; margin: 0; font-size: 6.5px; color: #aaa; letter-spacing: 1px; }
        
        /* Battery dot & text mathematically centered in the 50px left margin */
        body.ls .bat { position: absolute; left: 25px; top: 35px; transform: translateX(-50%); font-size: 6.5px; color: #aaa; flex-direction: column; align-items: center; width: auto; }
        body.ls .bat .bl { margin-bottom: 4px; }
        
        body.ls .cw { margin: 0; position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 10; }
        body.ls .cw > * { pointer-events: auto; }
        
        /* Giant responsive Gamepad Buttons */
        body.ls .dp { left: calc(12% + env(safe-area-inset-left)); top: 45%; transform: translate(-50%, -50%) scale(1.6); transform-origin: center center; margin: 0; }
        body.ls .ab { right: calc(12% + env(safe-area-inset-right)); left: auto; top: 45%; transform: translate(50%, -50%) rotate(-20deg) scale(1.6); transform-origin: center center; margin: 0; }
        body.ls .sysb { left: calc(12% + env(safe-area-inset-left)); right: auto; bottom: calc(12% + env(safe-area-inset-bottom)); transform: translate(-50%, 0) scale(1.4); transform-origin: center center; width: 120px; }
        body.ls .spk { right: calc(12% + env(safe-area-inset-right)); left: auto; bottom: calc(12% + env(safe-area-inset-bottom)); transform: translate(50%, 0) rotate(-20deg) scale(1.4); transform-origin: center center; }
    </style>
</head>
<body>
    <button id="tgl">ROTATE UI</button>
    <div class="gb" id="gb">
        <div class="sb">
            <div class="sh"><div class="bat"><div class="bl"></div>BATTERY</div><div class="st">DOT MATRIX WITH STEREO SOUND</div></div>
            <div class="cc"><canvas id="cv" width="200" height="200"></canvas></div>
        </div>
        <div class="cw">
            <div class="dp">
                <div class="dpp dpv"></div><div class="dpp dph"></div><div class="dpc"></div>
                <div class="dh hu" id="bU"></div><div class="dh hd" id="bD"></div><div class="dh hl" id="bL"></div><div class="dh hr" id="bR"></div>
            </div>
            <div class="ab">
                <div class="abc"><button class="ba" id="bB"></button><div class="blab">B</div></div>
                <div class="abc"><button class="ba" id="bA"></button><div class="blab">A</div></div>
            </div>
            <div class="sysb">
                <div class="sysbc"><div class="bsy" id="bSE"></div><div class="sysl">SELECT</div></div>
                <div class="sysbc"><div class="bsy" id="bST"></div><div class="sysl">START</div></div>
            </div>
            <div class="spk"><div class="sps"></div><div class="sps"></div><div class="sps"></div><div class="sps"></div><div class="sps"></div><div class="sps"></div></div>
        </div>
    </div>

    <script>
        const M = Math, D = document, W = window;
        
        // --- Native Dimension Engine ---
        const rsz = () => {
            const gb = D.getElementById('gb');
            const isLs = D.body.classList.contains('ls');
            if (isLs) {
                // By forcing exact native pixels, mobile browsers won't clip the background wrapper!
                gb.style.width = W.innerWidth + 'px';
                gb.style.height = W.innerHeight + 'px';
                gb.style.transform = 'none'; 
            } else {
                gb.style.width = '380px';
                gb.style.height = '680px';
                const scale = M.min(W.innerWidth / 380, W.innerHeight / 680) * 0.98;
                gb.style.transform = `scale(${scale})`;
            }
        };

        const checkOri = () => {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || ('ontouchstart' in W);
            if(isMobile) {
                if(W.innerWidth > W.innerHeight) D.body.classList.add('ls');
                else D.body.classList.remove('ls');
            }
            rsz();
        };

        W.addEventListener('resize', checkOri);
        W.addEventListener('orientationchange', checkOri);
        D.getElementById('tgl').addEventListener('click', () => { D.body.classList.toggle('ls'); rsz(); });
        checkOri(); // Init layout

        const ctx = D.getElementById('cv').getContext('2d');
        const C0='#0f380f', C1='#306230', C2='#8bac0f', C3='#9bbc0f';
        let sys = 'MENU', gT = 0, k = {U:0, D:0, L:0, R:0, A:0, B:0, ST:0, SE:0};
        
        const txt = (t,x,y,sz,a='center',c=C0) => { ctx.fillStyle=c; ctx.font=`${sz}px "Press Start 2P"`; ctx.textAlign=a; ctx.fillText(t,x,y); };
        const fr = (x,y,w,h,c=C0) => { ctx.fillStyle=c; ctx.fillRect(x,y,w,h); };
        const sr = (x,y,w,h,c=C0) => { ctx.strokeStyle=c; ctx.lineWidth=2; ctx.strokeRect(x,y,w,h); };

        /* === 1. SUPER MARIO LAND === */
        const sI = [ "    0000    ", "   00000000 ", "   2220220  ", "  202220222 ", "  202222000 ", "  220000    ", "    222000  ", "   112111   ", "  11122111  ", "  1111221111", "  2211111122", "   22    22 ", "  000    000", "  0000  0000" ].join('');
        const sW = [ "    0000    ", "   00000000 ", "   2220220  ", "  202220222 ", "  202222000 ", "  220000    ", "    22200   ", "   1121111  ", "  111221111 ", "  111122111 ", "   22222    ", "    22 000  ", "  000  0000 ", "  0000      " ].join('');
        const sJ = [ "    0000    ", "   00000000 ", "   2220220  ", "  202220222 ", "  202222000 ", "  220000    ", "    222000  ", "   00200000 ", "  0002200000", "  000022000 ", "   22222    ", "   22  22   ", "  000  000  ", "  0000 0000 " ].join('');

        const ML = {
            n:"SUPER MARIO", st:'START', sc:0, cns:0, cX:0, t:398, p:{x:20, y:120, vx:0, vy:0, w:10, h:14, g:0, d:0}, lvl:[], en:[],
            ini(){ this.st='START'; this.sc=0; this.cns=0; this.rL(); },
            rL(){
                this.cX=0; this.t=398; this.p={x:20, y:120, vx:0, vy:0, w:10, h:14, g:0, d:0}; this.en=[];
                this.lvl = Array(20).fill(0).map(()=>Array(240).fill(' '));
                let fl=(x,w)=>{for(let c=x;c<x+w;c++){this.lvl[18][c]='#';this.lvl[19][c]='#';}};
                let bp=(x,y,h)=>{for(let i=0;i<h;i++){this.lvl[y+i][x]='P';this.lvl[y+i][x+1]='P';}};
                let bl=(x,y,s)=>{for(let i=0;i<s.length;i++)this.lvl[y][x+i]=s[i];};
                let cl=(x,y,h,c)=>{for(let i=0;i<h;i++)this.lvl[y+i][x]=c;};
                let en=(x,y)=>this.en.push({x:x*10,y:y*10,vx:-30,vy:0,w:10,h:10,d:0});
                
                fl(0, 48); fl(52, 28); fl(84, 42); fl(129, 100);
                bp(16, 16, 2); bp(28, 15, 3); bp(40, 14, 4); bp(60, 16, 2); bp(86, 16, 2); bp(133, 16, 2);
                bl(22, 12, "?"); bl(32, 12, "B?B?B"); bl(54, 12, "?"); bl(66, 12, "B?B?B"); bl(72, 8, "B?B");
                bl(98, 12, "B"); bl(104, 12, "?"); bl(110, 12, "B"); bl(116, 12, "?");
                for(let i=0; i<4; i++){ cl(143+i, 17-i, i+1, '#'); cl(150+i, 14+i, 4-i, '#'); } 
                for(let i=0; i<8; i++) cl(200+i, 17-i, i+1, '#'); 
                bl(215, 16, "DD"); bl(215, 17, "DD"); 
                
                en(24, 17); en(36, 17); en(56, 17); en(76, 17); en(80, 17); en(112, 17); en(118, 17); en(165, 17); en(170, 17);
            },
            tA(x,y,w,h){
                let ts=[]; let r1=M.max(0,~~(y/10)), r2=M.min(19,~~((y+h-.1)/10));
                let c1=M.max(0,~~(x/10)), c2=M.min(239,~~((x+w-.1)/10));
                for(let r=r1; r<=r2; r++) for(let c=c1; c<=c2; c++) if(this.lvl[r]&&this.lvl[r][c]!==' '&&this.lvl[r][c]!=='D') ts.push({r,c,t:this.lvl[r][c]});
                return ts;
            },
            upd(dt){
                if(this.st!=='PLAYING') return;
                let dtS = M.min(dt/1000, 0.05); 
                let m = this.p;
                
                if(k.L) m.vx -= 800 * dtS; if(k.R) m.vx += 800 * dtS; if(!k.L && !k.R) m.vx *= 0.8;
                let mxS = k.B ? 150 : 90; m.vx = M.max(-mxS, M.min(mxS, m.vx));
                if(M.abs(m.vx) < 5 && !k.L && !k.R) m.vx = 0;
                
                m.x += m.vx * dtS;
                if(m.x < this.cX) { m.x = this.cX; m.vx = 0; }
                
                let tx = this.tA(m.x, m.y, m.w, m.h - 0.1);
                if(tx.length) {
                    if(m.vx > 0) m.x = tx[0].c*10 - m.w;
                    else if(m.vx < 0) m.x = tx[tx.length-1].c*10 + 10;
                    m.vx = 0;
                }
                
                if(k.A && m.g) { m.vy = -280; m.g = 0; } 
                if(!k.A && m.vy < 0) m.vy *= 0.75; 
                m.vy += 700 * dtS; if(m.vy > 200) m.vy = 200;
                
                m.y += m.vy * dtS;
                m.g = 0;
                
                let ty = this.tA(m.x + 0.5, m.y, m.w - 1, m.h);
                if(ty.length) {
                    if(m.vy > 0) { m.y = ty[0].r*10 - m.h; m.g = 1; m.vy = 0; } 
                    else if(m.vy < 0) { 
                        m.y = ty[ty.length-1].r*10 + 10; m.vy = 0;
                        for(let b of ty) {
                            if(b.t==='?') { this.lvl[b.r][b.c] = 'E'; this.cns++; this.sc+=100; }
                            else if(b.t==='B') { this.lvl[b.r][b.c] = ' '; this.sc+=10; }
                        }
                    }
                }
                
                if(m.y > 200) this.st = 'GAMEOVER';
                this.cX = M.max(this.cX, m.x - 90); 
                if(m.vx !== 0) m.d = m.vx > 0 ? 0 : 1; 
                if(gT % 1000 < 50) this.t = M.max(0, this.t - 1);
                
                for(let i=this.en.length-1; i>=0; i--) {
                    let e = this.en[i];
                    if(e.d) { e.vy -= dtS*10; if(e.vy < -1) this.en.splice(i,1); continue; }
                    e.vy += 450*dtS; e.y += e.vy*dtS;
                    let ey = this.tA(e.x+0.5, e.y, e.w-1, e.h);
                    if(ey.length) { e.y = ey[0].r*10 - e.h; e.vy = 0; }
                    e.x += e.vx*dtS;
                    let ex = this.tA(e.x, e.y, e.w, e.h-0.1);
                    if(ex.length) { e.x -= e.vx*dtS; e.vx *= -1; }
                    if(m.x < e.x+e.w && m.x+m.w > e.x && m.y < e.y+e.h && m.y+m.h > e.y) {
                        if(m.vy > 0 && m.y < e.y) { e.d = 1; e.vy = 0; m.vy = -180; this.sc+=100; }
                        else this.st = 'GAMEOVER';
                    }
                }
                if(this.lvl[~~(m.y/10)] && this.lvl[~~(m.y/10)][~~(m.x/10)] === 'D') this.st = 'TRANS';
            },
            inp(b){ if(this.st==='START'||this.st==='GAMEOVER'||this.st==='TRANS'){ if(b==='ST'||b==='A'){ this.rL(); this.st='PLAYING'; } } },
            drw(){
                if(this.st==='START'){ 
                    fr(0, 0, 200, 200, C2); fr(140, 20, 30, 8, C3); fr(145, 16, 20, 16, C3);
                    ctx.strokeStyle = C0; ctx.lineWidth = 1; ctx.beginPath();
                    ctx.moveTo(10, 100); ctx.lineTo(40, 70); ctx.lineTo(70, 100);
                    ctx.moveTo(150, 100); ctx.lineTo(175, 75); ctx.lineTo(200, 100); ctx.stroke();
                    fr(10, 35, 180, 40, C2); sr(10, 35, 180, 40, C0); sr(13, 38, 174, 34, C0); fr(14, 39, 172, 32, C2);
                    fr(16, 41, 2, 2, C0); fr(182, 41, 2, 2, C0); fr(16, 66, 2, 2, C0); fr(182, 66, 2, 2, C0); 
                    sr(85, 75, 8, 30, C0); sr(107, 75, 8, 30, C0); 
                    txt("SUPER", 100, 53, 14, 'center', C0); txt("MARIOLAND", 100, 68, 14, 'center', C0);
                    for(let i=0; i<168; i++) { let c = sI[i]; if(c !== ' ') fr(12 + (i%12), 21 + ~~(i/12), 1, 1, c==='0'?C0:c==='1'?C1:c==='2'?C2:C3); }
                    for(let c=0; c<40; c++){ fr(c*5, 105, 5, 5, C0); fr(c*5+1, 106, 3, 3, C2); } fr(0, 110, 200, 90, C2); 
                    txt("TOP- 407150", 100, 130, 10, 'center', C0);
                    if(~~(gT/400)%2===0) fr(55, 146, 6, 6, C0);
                    txt("START", 100, 154, 10, 'center', C0); txt("1-1", 160, 154, 10, 'center', C0);
                    txt("©1989 Nintendo", 100, 185, 8, 'center', C0);
                    return; 
                }
                
                let bgX = -(this.cX * 0.3);
                ctx.strokeStyle = C1; ctx.lineWidth = 1; ctx.beginPath();
                for(let i=0; i<8; i++) { let px = bgX + i*180; ctx.moveTo(px, 140); ctx.lineTo(px+60, 50); ctx.lineTo(px+120, 140); } ctx.stroke();
                for(let i=0; i<6; i++) { let cx = bgX + 40 + i*140; fr(cx, 40, 24, 8, C2); fr(cx+4, 36, 16, 16, C2); }

                for(let r=0; r<20; r++){
                    for(let c=M.max(0,~~(this.cX/10)); c<=M.min(239,~~((this.cX+200)/10)); c++){
                        let t=this.lvl[r][c], x=c*10-this.cX, y=r*10;
                        if(t==='#') { fr(x,y,10,10,C2); sr(x,y,10,10,C1); fr(x+2,y+2,2,2,C0); fr(x+6,y+6,2,2,C0); }
                        else if(t==='?') { fr(x,y,10,10,C0); fr(x+1,y+1,8,8,C2); txt("?", x+5, y+8, 8, 'center', C0); }
                        else if(t==='E') { sr(x,y,10,10,C0); fr(x+2,y+2,6,6,C0); }
                        else if(t==='B') { sr(x,y,10,10,C0); fr(x+2,y+4,6,2,C0); }
                        else if(t==='P') { fr(x,y,10,10,C1); sr(x,y,10,10,C0); }
                        else if(t==='D') { fr(x,y,10,10,C0); fr(x+2,y+2,6,8,C3); }
                    }
                }

                    if(this.tA(ex+1, e.y+1, hw, hh).some(b=>['T','W','R','D','C','c'].includes(b.t))) e.vx *= -1; else e.x = ex;
                    if(this.tA(e.x+1, ey+1, hw, hh).some(b=>['T','W','R','D','C','c'].includes(b.t))) e.vy *= -1; else e.y = ey;

                    if(p.aT>0 && e.hT<=0 && sHx<e.x+e.w && sHx+sHw>e.x && sHy<e.y+e.h && sHy+sHh>e.y) {
                        e.hp--; e.hT=300; e.kx=(e.x-p.x>0?1:-1)*200; e.ky=(e.y-p.y>0?1:-1)*200;

            inp(b){

                    let ts = this.tA(sx, sy, sw, sh);

                let px = this.p.x - this.cX, py = this.p.y - this.cY;

                txt("G:"+this.p.gems, 195, 12, 8, 'right');

                if(this.st==='TRANS'){ 
                    fr(10,60,180,80,'rgba(155,188,15,.9)'); sr(10,60,180,80,C0);

                    if(~~(gT/400)%2===0)txt("PRESS START",100,125,8); 
                }
            },
            art(x,y,w,h){ fr(x,y,w,h,C2); sr(x,y,w,h,C0); fr(x+w/2-5, y+h/2-5, 10, 10, C0); fr(x+w/2+10, y+h/2-10, 8, 20, C1); fr(x+w/2-20, y+h/2, 8, 8, C0); }
        };

        /* === 10. BOMBER BOY === */
        const BM = {
            n:"BOMBER BOY", st:'START', mC: 0,
            ini(mode){
                if(mode===undefined) { this.st='START'; this.mC=0; return; }

                this.map=[]; this.bs=[]; this.fs=[]; this.pwrs=[]; this.ens=[]; this.bots=[];
                for(let y=0;y<13;y++){
                    let r=[];

                    this.map.push(r);
                }
                
                let clr = (cx,cy) => { this.map[cy][cx]='.'; this.map[cy][cx+(cx===0?1:-1)]='.'; this.map[cy+(cy===0?1:-1)][cx]='.'; };
                clr(0,0);
                this.p = {x:4, y:4, w:10, h:10, bMax:1, bRad:1, a:1};
                
                if(this.mode === 1) { 
                    clr(12,0); clr(0,12); clr(12,12);
                    this.bots.push({id:1, x:2+12*15, y:2, dx:-1, dy:0, bMax:1, bRad:1, a:1});
                    this.bots.push({id:2, x:2, y:2+12*15, dx:1, dy:0, bMax:1, bRad:1, a:1});
                    this.bots.push({id:3, x:2+12*15, y:2+12*15, dx:-1, dy:0, bMax:1, bRad:1, a:1});
                }

                let numE = this.mode === 0 ? 3 : 1; 
                for(let i=0; i<numE; i++) {
                    let ex, ey;
                    do { ex = ~~(M.random()*13); ey = ~~(M.random()*13); }
                    while (this.map[ey][ex] !== '.' || (ex<3 && ey<3) || (ex>9&&ey<3) || (ex<3&&ey>9) || (ex>9&&ey>9));
                    let ds = [[-1,0],[1,0],[0,-1],[0,1]];
                    let d = ds[~~(M.random()*4)];
                    this.ens.push({x: 2+ex*15, y: 2+ey*15, dx: d[0], dy: d[1]});
                }
            },
            cK(x,y, isE=0){
                let r1=M.max(0,~~((y-2)/15)), r2=M.min(12,~~((y+9-2)/15));
                let c1=M.max(0,~~((x-2)/15)), c2=M.min(12,~~((x+9-2)/15));
                for(let r=r1;r<=r2;r++) for(let c=c1;c<=c2;c++) {
                    if(this.map[r][c]==='#'||this.map[r][c]==='S') return 1;
                }
                for(let b of this.bs) {
                    let bx = 2+b.x*15, by = 2+b.y*15;
                    if (x < bx+15 && x+10 > bx && y < by+15 && y+10 > by) {
                        if (isE || !b.wlk) return 1;
                    }
                }
                return (x<2 || x+10>197 || y<2 || y+10>197);
            },
            upd(dt){
                if(this.st!=='PLAYING') return;

                for(let b of this.bs) {

                        let pT = this.p.a && !(this.p.x >= bx+15 || this.p.x+10 <= bx || this.p.y >= by+15 || this.p.y+10 <= by);
                        let bT = this.bots.some(bot => bot.a && !(bot.x >= bx+15 || bot.x+10 <= bx || bot.y >= by+15 || bot.y+10 <= by));

                if(this.p.a) {
                    let nx=this.p.x, ny=this.p.y;

                        if(cy - M.floor(cy) < 0.4 && !this.cK(nx, this.p.y-1)) this.p.y-=1;

                for(let i=this.pwrs.length-1; i>=0; i--) {
                    let pwr = this.pwrs[i];

                        if(hit(this.p)) { this.p.a = 0; this.st = 'GAMEOVER'; }

                            let e = this.ens[j];
                            if(e.x < fx+14 && e.x+10 > fx+1 && e.y < fy+14 && e.y+10 > fy+1) this.ens.splice(j,1);

                    }
                }
                
                if(this.mode === 0 && this.ens.length === 0 && this.st === 'PLAYING') this.st = 'TRANS';
                if(this.mode === 1 && this.p.a && this.bots.filter(b=>b.a).length === 0 && this.st === 'PLAYING') this.st = 'TRANS';
            },
            exp(tx, ty, rad) {
                this.addF(tx, ty);
                let ds = [[0,-1],[0,1],[-1,0],[1,0]];
                for(let d of ds) {
                    for(let i=1; i<=rad; i++) {
                        let nx = tx+d[0]*i, ny = ty+d[1]*i;
                        if(nx<0||nx>12||ny<0||ny>12) break;
                        let cell = this.map[ny][nx];
                        if(cell === '#') break;
                        
                        let bIdx = this.bs.findIndex(b=>b.x===nx && b.y===ny);
                        if(bIdx !== -1) this.bs[bIdx].t = 0;

                        if(cell === 'S') {
                            this.map[ny][nx] = '.';
                            this.addF(nx, ny);
                            if(M.random() < 0.25) this.pwrs.push({x: nx, y: ny, t: M.random() < 0.5 ? 'F' : 'B'});
                            break; 
                        }
                        this.addF(nx, ny);
                    }
                }
            },
            addF(x, y) {
                if(!this.fs.find(f=>f.x===x && f.y===y)) this.fs.push({x,y,t:400});
            },
            inp(b){
                if(this.st==='START') {
                    if(b==='U') this.mC = 0;
                    if(b==='D') this.mC = 1;
                    if(b==='ST'||b==='A') this.ini(this.mC); 
                } else if(this.st==='GAMEOVER'||this.st==='TRANS'){ 
                    if(b==='ST'||b==='A') this.ini(); 
                } else if(this.st==='PLAYING' && b==='A' && this.p.a) {
                    if(this.bs.filter(bm=>bm.oid===0).length < this.p.bMax) {

                        }
                    }
                }
            },
            drw(){
                if(this.st==='START'){ 
                    txt("BOMBER BOY",100,40,14); 
                    if(~~(gT/300)%2===0) txt(">", 20, this.mC===0 ? 90 : 110, 10, 'left', C0);
                    txt("SOLO MODE", 100, 90, 10, 'center', this.mC===0?C0:C1);
                    txt("AI MATCH", 100, 110, 10, 'center', this.mC===1?C0:C1);
                    if(~~(gT/400)%2===0)txt("PRESS START",100,160,8); 
                    return; 
                }
                
                for(let y=0; y<13; y++) {
                    for(let x=0; x<13; x++) {
                        let px = 2+x*15, py = 2+y*15;
                        let c = this.map[y][x];
                        if(c==='#') { fr(px,py,15,15,C1); fr(px+2,py+2,11,11,C0); }
                        else if(c==='S') { fr(px,py,15,15,C2); sr(px,py,15,15,C1); fr(px,py+7,15,1,C1); fr(px+7,py,1,7,C1); fr(px+3,py+7,1,8,C1); }
                    }
                }

                for(let p of this.pwrs) {
                    let px = 2+p.x*15, py = 2+p.y*15;
                    fr(px+2, py+2, 11, 11, C3); sr(px+2, py+2, 11, 11, C0);
                    txt(p.t, px+7.5, py+10, 8, 'center', C0);
                }

                for(let b of this.bs) {
                    let px = 2+b.x*15, py = 2+b.y*15;
                    ctx.fillStyle=C0; ctx.beginPath(); ctx.arc(px+7.5, py+7.5, 6, 0, M.PI*2); ctx.fill();
                    if(~~(b.t/100)%2===0) fr(px+6, py+2, 3, 3, C3);
                }

                for(let f of this.fs) {
                    let px = 2+f.x*15, py = 2+f.y*15;
                    fr(px+2, py+2, 11, 11, C0); fr(px+4, py+4, 7, 7, C2); fr(px+6, py+6, 3, 3, C3);
                }

                for(let e of this.ens) {
                    fr(e.x, e.y, 10, 10, C1); fr(e.x+2, e.y+2, 2, 2, C3); fr(e.x+6, e.y+2, 2, 2, C3);
                }

                for(let bot of this.bots) {
                    if(!bot.a) continue;
                    fr(bot.x, bot.y, 10, 10, C1);
                    fr(bot.x+2, bot.y+2, 6, 5, C3); 
                    fr(bot.x+3, bot.y+3, 1, 2, C0); 
                    fr(bot.x+6, bot.y+3, 1, 2, C0); 
                }

                if (this.p.a) {
                    fr(this.p.x, this.p.y, 10, 10, C0);
                    fr(this.p.x+2, this.p.y+2, 6, 5, C3); 
                    fr(this.p.x+3, this.p.y+3, 1, 2, C0); 
                    fr(this.p.x+6, this.p.y+3, 1, 2, C0); 
                }

                if(this.st==='GAMEOVER'){ fr(10,60,180,80,'rgba(155,188,15,.9)'); sr(10,60,180,80,C0); txt("GAME OVER",100,100,12); }
                if(this.st==='TRANS'){ fr(10,60,180,80,'rgba(155,188,15,.9)'); sr(10,60,180,80,C0); txt(this.mode===1?"SURVIVOR!":"CLEARED!",100,90,10); if(~~(gT/400)%2===0)txt("PRESS START",100,125,8); }
            },
            art(x,y,w,h){ fr(x,y,w,h,C3); sr(x,y,w,h,C0); ctx.fillStyle=C0; ctx.beginPath(); ctx.arc(x+w/2, y+h/2+5, 12, 0, M.PI*2); ctx.fill(); fr(x+w/2-2, y+h/2-10, 4, 6, C0); fr(x+w/2+4, y+h/2-2, 4, 4, C3); }
        };

        /* === MENU & ROUTING === */
        const GL = [ML, T2, CR, IV, SN, SD, PG, BB, RP, BM]; 
        GL.sort((a, b) => a.n.localeCompare(b.n));
        let mC = 0;
        GL.forEach(g=>g.ini()); 

        function drawMenu() {
            txt("GAME SELECT", 100, 22, 10); fr(10, 30, 180, 2, C0); 
            GL[mC].art(60, 38, 80, 50);

            let lX=20, lY=98, lH=80, iH=16, mxV=5;
            let scr = M.max(0, M.min((mC-2)*iH, M.max(0, (GL.length*iH)-lH)));

            ctx.save(); ctx.beginPath(); ctx.rect(lX, lY, 160, lH); ctx.clip();
            GL.forEach((g, i) => {
                let y = lY + 12 + (i*iH) - scr;
                if(i===mC && ~~(gT/300)%2===0) txt(">", lX, y, 10, 'left', C0);
                txt(g.n, lX+15, y, 10, 'left', i===mC?C0:C1);
            });
            ctx.restore();

            if(GL.length > mxV) {
                fr(180, lY, 4, lH, C1);
                let th = M.max(10, (mxV/GL.length)*lH), pc = mC/(GL.length-1);
                fr(179, lY + pc*(lH-th), 6, th, C0);
            }
            txt("D-PAD:SELECT  A:PLAY", 100, 190, 7, 'center', C1);
        }

        function trg(b) {
            if(sys === 'MENU') {
                if(b==='U') mC = M.max(0, mC-1); else if(b==='D') mC = M.min(GL.length-1, mC+1);
                else if(b==='ST'||b==='A'){ GL[mC].ini(); sys = 'GAME'; }
            } else {
                if(b==='SE') sys = 'MENU'; else GL[mC].inp(b);
            }
        }

        const kM = { "ArrowUp":"U","w":"U","W":"U", "ArrowDown":"D","s":"D","S":"D", "ArrowLeft":"L","a":"L","A":"L", "ArrowRight":"R","d":"R","D":"R", "Enter":"ST", "Shift":"SE", "z":"A","Z":"A"," ":"A", "x":"B","X":"B","Backspace":"B" };
        D.addEventListener("keydown", (e) => { if(kM[e.key]) { e.preventDefault(); if(!k[kM[e.key]]) trg(kM[e.key]); k[kM[e.key]] = 1; } });
        D.addEventListener("keyup", (e) => { if(kM[e.key]) { e.preventDefault(); k[kM[e.key]] = 0; } });

        ['U','D','L','R','A','B','ST','SE'].forEach(btn => {
            const el = D.getElementById('b'+btn);
            const p = (e) => { e.preventDefault(); if(!k[btn]) trg(btn); k[btn] = 1; };
            const r = (e) => { e.preventDefault(); k[btn] = 0; };
            el.addEventListener('mousedown', p); el.addEventListener('touchstart', p, {passive: 0});
            el.addEventListener('mouseup', r); el.addEventListener('mouseleave', r); el.addEventListener('touchend', r); el.addEventListener('touchcancel', r);
        });

        let lt = performance.now();
        function loop(t) {
            let dt = t - lt; lt = t; gT += dt;
            fr(0, 0, 200, 200, C3);
            if(sys === 'MENU') drawMenu(); else { GL[mC].upd(dt); GL[mC].drw(); }
            requestAnimationFrame(loop);
        }
        setTimeout(() => requestAnimationFrame(loop), 150);
    </script>
</body>
</html>
